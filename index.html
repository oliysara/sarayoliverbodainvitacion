<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex,nofollow" />
<title>Invitación Sara & Oliver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --green:#606044; --bg:#858879; --paper:#fbfaf6; --gold:#b28a43; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%;background:var(--bg);font-family:'Cormorant Garamond',serif;color:var(--green);overflow:hidden}
  body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 50% 30%,rgba(255,255,255,.10),transparent 42%),linear-gradient(180deg,rgba(255,255,255,.05),transparent);pointer-events:none}
  body.locked #app{opacity:0;pointer-events:none;filter:blur(3px);transform:scale(.985)}
  body.unlocked #app{opacity:1;pointer-events:auto;filter:none;transform:none}
  #app{transition:opacity .55s ease,filter .55s ease,transform .55s ease}
  #app{position:relative;width:100vw;height:100svh;display:grid;place-items:center;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  .phone{position:relative;width:min(100vw,430px);height:min(100svh,645px);aspect-ratio:2/3;max-height:100svh;overflow:hidden;border-radius:0;filter:drop-shadow(0 18px 30px rgba(0,0,0,.12));}
  .screen{position:absolute;inset:0;display:none;align-items:center;justify-content:center;transform:translateY(16px) scale(.985);opacity:0;filter:blur(4px);transition:opacity .45s ease,transform .45s cubic-bezier(.18,.88,.2,1),filter .45s ease;will-change:opacity,transform,filter;backface-visibility:hidden;}
  .screen.active{display:flex;opacity:1;transform:none;filter:blur(0)}
  .screen.leaving{display:flex;opacity:0;transform:translateY(-18px) scale(.99);filter:blur(5px)}
  .svg-page{width:100%;height:100%;object-fit:contain;display:block;user-select:none;pointer-events:none}
  .hq-page{image-rendering:auto;transform:none!important;filter:none!important;will-change:auto!important;backface-visibility:visible}
  .cover{background:var(--bg);isolation:isolate}
  .cover-card{position:absolute;inset:0;background-image:url('assets/cover_hq_new.png');background-size:100% 100%;background-position:center;background-repeat:no-repeat;opacity:0}
  body.unlocked .cover-card{animation:paperIn 1.1s .15s both cubic-bezier(.2,.8,.2,1)}
  .cover-text{position:absolute;left:6%;right:6%;top:44.6%;text-align:center;line-height:1.15;color:var(--green);font-family:'Great Vibes',cursive;text-shadow:none;pointer-events:none;opacity:1;isolation:isolate;transform:translateZ(0)}
  .cover-text .line{display:block;white-space:nowrap;font-size:clamp(31px,8.4vw,39px);letter-spacing:.01em;overflow:visible}
  .cover-text .line.small{font-size:clamp(30px,8vw,38px);margin-top:.30em}
  .word{display:inline-block;opacity:0;visibility:hidden;transform:translate3d(0,12px,0);transition:opacity .62s cubic-bezier(.18,.9,.2,1),transform .62s cubic-bezier(.18,.9,.2,1),visibility 0s linear .62s;will-change:opacity,transform;background:transparent;-webkit-backface-visibility:hidden;backface-visibility:hidden}
  .word.revealed{opacity:1;visibility:visible;transform:translate3d(0,0,0);transition:opacity .62s cubic-bezier(.18,.9,.2,1),transform .62s cubic-bezier(.18,.9,.2,1),visibility 0s}
  .w1,.w2,.w3,.w4,.w5,.w6{animation-delay:0s}
  .cover-text .line.small .word{display:inline-block;line-height:1.25;padding-bottom:.08em;}
  .rings-glow{position:absolute;left:36%;right:36%;top:62.7%;height:6%;border-radius:50%;opacity:0}
  body.unlocked .rings-glow{animation:softIn .8s 3.7s both ease}

  .countdown{position:absolute;left:15.7%;top:34.9%;width:68.6%;height:9.3%;z-index:4;background:transparent;border-radius:0;display:grid;grid-template-columns:repeat(4,1fr);align-items:center;gap:0;padding:0;box-shadow:none;opacity:0;transform:translateY(10px);animation:countIn .9s .35s both cubic-bezier(.18,.88,.2,1);pointer-events:none;color:var(--green);font-family:'Cormorant Garamond',serif}
  .countdown .unit{text-align:center;line-height:1;min-width:0}
  .countdown .num{display:block;font-size:clamp(22px,7.1vw,34px);font-weight:600;letter-spacing:.03em;color:var(--green);font-variant-numeric:tabular-nums lining-nums;text-shadow:0 .5px 0 rgba(255,255,255,.15)}
  .countdown .label{display:block;margin-top:.18em;font-size:clamp(7px,2vw,9.6px);font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--green);opacity:.94}
  @keyframes countIn{from{opacity:0;transform:translateY(10px);filter:blur(4px)}to{opacity:1;transform:none;filter:blur(0)}}
  .hotspot{position:absolute;border:0;background:rgba(255,255,255,0);cursor:pointer;z-index:10;border-radius:999px;color:transparent;font-size:0}
  .hotspot:focus-visible{outline:2px solid rgba(96,96,68,.6);outline-offset:3px}
  .btn-cover{left:35%;top:71.7%;width:30%;height:7.5%}
  .btn-more{left:28%;top:91.4%;width:44%;height:7%}
  .btn-info{left:25%;top:49.5%;width:50%;height:9.8%;border-radius:8px}
  .btn-menu{left:25%;top:60.0%;width:50%;height:8.7%;border-radius:8px}
  .btn-question{left:25%;top:69.0%;width:50%;height:8.5%;border-radius:8px}
  .btn-back{left:25%;top:91%;width:50%;height:7%}
  .btn-form{left:35%;top:48.5%;width:30%;height:8%;border-radius:12px}

  .menu-main-action{position:absolute;left:32%;top:80.1%;width:36%;height:4.8%;z-index:11;border:0;border-radius:999px;background:var(--green);color:#fbfaf6;font-family:'Cormorant Garamond',serif;font-size:clamp(10px,2.85vw,13px);font-weight:600;letter-spacing:.035em;box-shadow:0 6px 13px rgba(96,96,68,.16);display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer;transition:transform .16s ease,box-shadow .16s ease,opacity .16s ease;white-space:nowrap;padding:0 .55em}
  .menu-main-action:active{transform:translateY(2px) scale(.975);box-shadow:0 4px 9px rgba(96,96,68,.18);opacity:.94}
  .menu-main-action:focus-visible{outline:2px solid rgba(96,96,68,.55);outline-offset:3px}
  .btn-save-invitation{left:7.4%;top:90.45%;width:42.7%;height:7.6%;border-radius:999px}
  .btn-back-invitation{left:52.6%;top:90.45%;width:42.9%;height:7.6%;border-radius:999px}

  .page-wrap{position:absolute;inset:0;display:grid;place-items:center;}
  .page-wrap::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(0,0,0,.02));pointer-events:none;z-index:1}
  .screen.active .page-wrap{animation:pageEnter .45s both cubic-bezier(.16,.84,.25,1)}
  @keyframes paperIn{0%{opacity:0;transform:scale(.97) translateY(12px);filter:blur(8px)}100%{opacity:1;transform:none;filter:blur(0)}}
  @keyframes wordIn{0%{visibility:visible;opacity:0;transform:translate3d(0,12px,0)}1%{visibility:visible;opacity:0}100%{visibility:visible;opacity:1;transform:translate3d(0,0,0)}}
  @keyframes softIn{from{opacity:0;transform:translateY(8px) scale(.95)}to{opacity:.22;transform:none;background:rgba(255,255,255,.45)}}
  @keyframes pageEnter{0%{opacity:0;transform:translateY(28px) scale(.965);filter:blur(7px)}65%{opacity:1;filter:blur(0)}100%{opacity:1;transform:none;filter:blur(0)}}
  @media (min-aspect-ratio: 2/3){.phone{height:100svh;width:calc(100svh * 2 / 3)}}
  @media (max-aspect-ratio: 2/3){.phone{width:100vw;height:calc(100vw * 3 / 2)}}

  .lock-screen{position:fixed;inset:0;z-index:100;display:grid;place-items:center;background:var(--bg);transition:opacity .55s ease,visibility .55s ease;}
  .lock-screen::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 28%,rgba(255,255,255,.10),transparent 45%),linear-gradient(180deg,rgba(255,255,255,.04),rgba(0,0,0,.02));pointer-events:none}
  .lock-phone{position:relative;width:min(100vw,430px);height:min(100svh,645px);aspect-ratio:2/3;max-height:100svh;filter:drop-shadow(0 18px 30px rgba(0,0,0,.10));}
  .lock-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;user-select:none;pointer-events:none;}
  .lock-form{position:absolute;inset:0;margin:0;}
  .password-input{position:absolute;left:29%;top:56.2%;width:42%;height:4.7%;border:1px solid rgba(178,138,67,.72);background:rgba(251,250,246,.54);border-radius:999px;text-align:center;font-family:'Cormorant Garamond',serif;font-size:clamp(11px,2.85vw,14px);font-weight:500;letter-spacing:.12em;color:rgba(96,96,68,.92);outline:none;z-index:2;padding:0 5%;box-shadow:0 5px 11px rgba(96,96,68,.055), inset 0 1px 0 rgba(255,255,255,.62);backdrop-filter:blur(2px);}
  .password-input::placeholder{color:rgba(96,96,68,.42);}
  .password-input:focus{background:rgba(255,255,255,.68);box-shadow:0 7px 16px rgba(96,96,68,.08), inset 0 0 0 1px rgba(178,138,67,.30);}
  .enter-btn{position:absolute;left:35%;top:62.4%;width:30%;height:4.9%;border:1px solid rgba(178,138,67,.42);border-radius:14px;background:var(--green);color:#fbfaf6;font-family:'Cormorant Garamond',serif;font-size:clamp(10px,2.75vw,14px);font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;z-index:3;padding:0;box-shadow:0 8px 14px rgba(0,0,0,.095);transition:transform .16s ease,box-shadow .16s ease,opacity .16s ease;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1;}
  .enter-btn:active{transform:translateY(2px) scale(.975);box-shadow:0 7px 13px rgba(0,0,0,.10);opacity:.96;}
  .lock-error{position:absolute;left:20%;right:20%;top:68.6%;min-height:18px;text-align:center;font-family:'Cormorant Garamond',serif;font-size:clamp(11px,2.6vw,13px);font-weight:600;color:#8b4a3f;background:rgba(251,250,246,.82);border:1px solid rgba(139,74,63,.18);border-radius:999px;padding:3px 8px;opacity:0;transform:translateY(4px);transition:opacity .22s ease,transform .22s ease;pointer-events:none;z-index:4;}
  .lock-error.show{opacity:1;transform:none;}
  body.unlocked .lock-screen{opacity:0;visibility:hidden;pointer-events:none}
  .sound-toggle{position:fixed;right:14px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:30;width:42px;height:42px;border-radius:999px;border:1px solid rgba(255,255,255,.40);background:rgba(96,96,68,.72);color:#fff;font-size:18px;display:none;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(0,0,0,.16);backdrop-filter:blur(8px);cursor:pointer}
  body.unlocked .sound-toggle{display:flex}
  @media (prefers-reduced-motion: reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body class="locked">

<div id="lockScreen" class="lock-screen" aria-label="Acceso privado">
  <div class="lock-phone">
    <img class="lock-img" src="assets/password_screen.png" alt="Invitación privada Sara y Oliver">
    <form id="lockForm" class="lock-form" autocomplete="off">
      <input id="passwordInput" class="password-input" type="password" inputmode="text" placeholder="Contraseña" aria-label="Contraseña" />
      <button class="enter-btn" type="submit" aria-label="Entrar">Entrar</button>
      <div id="lockError" class="lock-error">Contraseña incorrecta. Inténtalo de nuevo.</div>
    </form>
  </div>
</div>
<audio id="weddingAudio" preload="auto" loop playsinline webkit-playsinline><source src="assets/perfect_swissduo.mp3" type="audio/mpeg"></audio>
<button id="soundToggle" class="sound-toggle" type="button" aria-label="Silenciar música">♪</button>

<div id="app">
  <main class="phone" aria-live="polite">
    <section id="s1" class="screen cover active" aria-label="Portada">
      <div class="cover-card"></div>
      <div class="cover-text" aria-hidden="true">
        <span class="line"><span class="word w1">Estás</span> <span class="word w2">invitado/a</span> <span class="word w3">a</span> <span class="word w4">la</span> <span class="word w5">boda</span></span>
        <span class="line small"><span class="word w6">de Sara y Oliver</span></span>
      </div>
      <div class="rings-glow"></div>
      <button class="hotspot btn-cover" data-go="s2" aria-label="Ver invitación">Ver invitación</button>
    </section>
    <section id="s2" class="screen" aria-label="Invitación">
      <div class="page-wrap"><img class="svg-page" src="assets/2.svg" alt="Invitación de boda de Sara y Oliver"></div>
      <button class="hotspot btn-more" data-go="s3" aria-label="Ver más">Ver más</button>
    </section>
    <section id="s3" class="screen" aria-label="Menú principal">
      <div class="page-wrap"><img class="svg-page hq-page" src="assets/menu_hq_new.png" alt="Menú principal"></div>
      <div class="countdown" aria-label="Cuenta atrás para la boda">
        <div class="unit"><span class="num" id="cd-days">000</span><span class="label">Días</span></div>
        <div class="unit"><span class="num" id="cd-hours">00</span><span class="label">Horas</span></div>
        <div class="unit"><span class="num" id="cd-minutes">00</span><span class="label">Min</span></div>
        <div class="unit"><span class="num" id="cd-seconds">00</span><span class="label">Seg</span></div>
      </div>
      <button class="hotspot btn-info" data-go="s4" aria-label="Información importante">Información importante</button>
      <button class="hotspot btn-menu" data-go="s5" aria-label="Menú">Menú</button>
      <button class="hotspot btn-question" data-go="s6" aria-label="Cuestionario">Cuestionario</button>
      <button class="menu-main-action" type="button" data-go="s7" aria-label="Ver y guardar invitación">Ver y guardar invitación</button>
    </section>
    <section id="s4" class="screen" aria-label="Información importante">
      <div class="page-wrap"><img class="svg-page" src="assets/info_importante_new-1.png" alt="Información importante"></div>
      <button class="hotspot btn-back" data-go="s3" aria-label="Volver al menú principal">Volver al menú principal</button>
    </section>
    <section id="s5" class="screen" aria-label="Menú de boda">
      <div class="page-wrap"><img class="svg-page" src="assets/5.svg" alt="Menú"></div>
      <button class="hotspot btn-back" data-go="s3" aria-label="Volver al menú principal">Volver al menú principal</button>
    </section>
    <section id="s6" class="screen" aria-label="Cuestionario">
      <div class="page-wrap"><img class="svg-page hq-page" src="assets/question_hq_new.png" alt="Cuestionario"></div>
      <button class="hotspot btn-form" data-url="https://oliysara.github.io/FORMULARIO-/" aria-label="Abrir cuestionario">Cuestionario</button>
      <button class="hotspot btn-back" data-go="s3" aria-label="Volver al menú principal">Volver al menú principal</button>
    </section>
    <section id="s7" class="screen" aria-label="Ver y guardar invitación">
      <div class="page-wrap"><img class="svg-page hq-page" src="assets/invitacion_guardar_hq.png" alt="Invitación de boda para guardar"></div>
      <a class="hotspot btn-save-invitation" href="assets/Invitacion_Sara_y_Oliver.pdf" download="Invitacion_Sara_y_Oliver.pdf" aria-label="Guardar invitación">Guardar invitación</a>
      <button class="hotspot btn-back-invitation" data-go="s3" aria-label="Volver al menú principal">Volver al menú principal</button>
    </section>
  </main>
</div>
<script>
const titleWords = [
  document.querySelector('.cover-text .w1'),
  document.querySelector('.cover-text .w2'),
  document.querySelector('.cover-text .w3'),
  document.querySelector('.cover-text .w4'),
  document.querySelector('.cover-text .w5'),
  document.querySelector('.cover-text .w6')
].filter(Boolean);
let introStarted = false;
function startIntro(){
  if(introStarted) return;
  introStarted = true;
  titleWords.forEach(w => w.classList.remove('revealed'));
  [1650,1880,2110,2340,2570,2860].forEach((delay, index) => {
    setTimeout(() => titleWords[index]?.classList.add('revealed'), delay);
  });
}

const screens=[...document.querySelectorAll('.screen')];
let current=document.querySelector('.screen.active');
function go(id){
  const next=document.getElementById(id); if(!next||next===current) return;
  current.classList.add('leaving'); current.classList.remove('active');
  next.style.display='flex';
  requestAnimationFrame(()=>next.classList.add('active'));
  setTimeout(()=>{screens.forEach(s=>{if(s!==next){s.classList.remove('leaving','active');s.style.display='none'}}); current=next;},470);
}
document.addEventListener('click',e=>{
  const b=e.target.closest('[data-go],[data-url]'); if(!b) return;
  if(b.dataset.go) go(b.dataset.go);
  if(b.dataset.url) window.location.href=b.dataset.url;
});


const PASSWORD = 'boda26';
const lockForm = document.getElementById('lockForm');
const passwordInput = document.getElementById('passwordInput');
const lockError = document.getElementById('lockError');
const audio = document.getElementById('weddingAudio');
const soundToggle = document.getElementById('soundToggle');
let audioFadeTimer = null;

function fadeAudioTo(target, duration = 1200){
  if(!audio) return;
  clearInterval(audioFadeTimer);
  const start = audio.volume || 0;
  const startTime = performance.now();
  audioFadeTimer = setInterval(() => {
    const progress = Math.min(1, (performance.now() - startTime) / duration);
    audio.volume = start + (target - start) * progress;
    if(progress >= 1) clearInterval(audioFadeTimer);
  }, 50);
}

function startMusic(){
  if(!audio) return;
  try{
    audio.muted = false;
    audio.volume = 0;
    if(audio.currentTime === 0) audio.currentTime = 0.01;
  }catch(e){}
  const playPromise = audio.play();
  if(playPromise && typeof playPromise.then === 'function'){
    playPromise.then(() => {
      if(soundToggle) soundToggle.textContent = '♪';
      fadeAudioTo(0.30, 3000);
    }).catch(() => {
      if(soundToggle) soundToggle.textContent = '♪̸';
    });
  }else{
    fadeAudioTo(0.30, 3000);
  }
}

lockForm?.addEventListener('submit', (e) => {
  e.preventDefault();
  const value = (passwordInput?.value || '').trim().toLowerCase();
  if(value !== PASSWORD){
    lockError?.classList.add('show');
    passwordInput?.focus();
    return;
  }
  lockError?.classList.remove('show');
  document.body.classList.remove('locked');
  document.body.classList.add('unlocked');
  startMusic();
  startIntro();
});

soundToggle?.addEventListener('click', () => {
  if(!audio) return;
  if(audio.paused || audio.volume === 0){
    audio.volume = 0; audio.play().then(() => { soundToggle.textContent = '♪'; fadeAudioTo(0.30, 1200); }).catch(()=>{});
  }else{
    fadeAudioTo(0, 450);
    setTimeout(() => { audio.pause(); soundToggle.textContent = '♪̸'; }, 480);
  }
});


let wasPlayingBeforeHidden = false;
let resumeAfterVisible = false;

document.addEventListener('visibilitychange', () => {
  if(!audio || !document.body.classList.contains('unlocked')) return;

  if(document.hidden){
    wasPlayingBeforeHidden = !audio.paused && audio.volume > 0;
    resumeAfterVisible = wasPlayingBeforeHidden;
    if(wasPlayingBeforeHidden){
      fadeAudioTo(0, 500);
      setTimeout(() => {
        if(document.hidden){
          try{ audio.pause(); }catch(e){}
        }
      }, 540);
    }
  }else if(resumeAfterVisible){
    resumeAfterVisible = false;
    try{
      audio.volume = 0;
      const playPromise = audio.play();
      if(playPromise && typeof playPromise.then === 'function'){
        playPromise.then(() => {
          if(soundToggle) soundToggle.textContent = '♪';
          fadeAudioTo(0.30, 900);
        }).catch(()=>{});
      }else{
        fadeAudioTo(0.30, 900);
      }
    }catch(e){}
  }
});

const weddingDate = new Date('2026-11-21T17:00:00+00:00').getTime();
const pad2 = n => String(n).padStart(2,'0');
function updateCountdown(){
  const remaining = Math.max(0, weddingDate - Date.now());
  const totalSeconds = Math.floor(remaining / 1000);
  const days = Math.floor(totalSeconds / 86400);
  const hours = Math.floor((totalSeconds % 86400) / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  const set = (id, value) => { const el = document.getElementById(id); if(el) el.textContent = value; };
  set('cd-days', String(days));
  set('cd-hours', pad2(hours));
  set('cd-minutes', pad2(minutes));
  set('cd-seconds', pad2(seconds));
}
updateCountdown();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
